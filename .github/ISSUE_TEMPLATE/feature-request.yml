name: Feature request
description: Suggest a deterministic CSV workflow improvement.
title: "[Feature] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Describe the workflow, not private data. Never paste real customer rows or attach a sensitive CSV to this public issue.
  - type: textarea
    id: problem
    attributes:
      label: Workflow problem
      description: What repeatable CSV task is difficult today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired deterministic outcome
      description: What exact local transformation or check should CSV Guard perform?
    validations:
      required: true
  - type: textarea
    id: synthetic_example
    attributes:
      label: Optional synthetic example
      description: Use invented or fully redacted values only.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I have not included or attached private, personal, customer, credential, or proprietary data.
          required: true
